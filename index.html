<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Filtros de aceite — Taller</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;
  --bg2:#11111c;
  --bg3:#181828;
  --border:#2a2a42;
  --border2:#3a3a55;
  --text:#f0ecd8;
  --text2:#9090aa;
  --text3:#5a5a78;
  --accent:#f5c518;
  --accent2:#d4a800;
  --accent3:#ffe066;
  --navy:#1e1e3a;
  --green:#4caf79;
  --red:#e05555;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:2rem 1rem 4rem}
.app{max-width:760px;margin:0 auto}
header{margin-bottom:2rem;border-bottom:2px solid var(--accent);padding-bottom:1.25rem;position:relative;text-align:center}
.logo-row{display:flex;flex-direction:column;align-items:center;gap:10px}

.logo-icon svg{width:18px;height:18px;fill:#0f0f0f}
h1{font-size:19px;font-weight:500;letter-spacing:-.3px}
.subtitle{font-size:12px;color:var(--text3);font-family:var(--mono)}
.tabs{display:flex;gap:6px;margin-bottom:1.75rem;background:var(--bg3);padding:5px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:9px 14px;font-size:13px;font-family:var(--sans);font-weight:500;background:transparent;border:1px solid transparent;border-radius:7px;color:var(--text2);cursor:pointer;transition:all .2s}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{background:var(--accent);color:var(--navy);border:1px solid var(--accent);font-weight:700}
.badge{font-size:11px;background:var(--border2);color:var(--text2);border-radius:999px;padding:1px 7px;font-family:var(--mono)}
.tab.active .badge{background:var(--accent);color:var(--navy)}
.page{display:none}.page.active{display:block}
.field-label{font-size:12px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
input[type=text],select{width:100%;padding:10px 12px;font-size:14px;font-family:var(--sans);background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none}
input[type=text]:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
select:disabled{opacity:.4;cursor:not-allowed}
.btn{width:100%;padding:11px;font-size:14px;font-family:var(--sans);font-weight:500;background:var(--accent);color:var(--navy);border:none;border-radius:7px;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:var(--accent2)}.btn:active{transform:scale(.99)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.result-box{margin-top:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;animation:fadeIn .2s ease;overflow-y:auto;max-height:80vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.result-vehicle{font-size:15px;font-weight:500;margin-bottom:4px}
.result-meta{font-size:12px;color:var(--text2);font-family:var(--mono);margin-bottom:14px}
.badges-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sbadge{display:inline-flex;align-items:center;font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:999px}
.sbadge.sg{background:rgba(245,197,24,.12);color:var(--accent);border:1px solid rgba(245,197,24,.3);font-weight:600}
.sg{background:rgba(232,197,71,.12);color:var(--accent);border:1px solid rgba(232,197,71,.25)}
.sai{background:rgba(130,130,255,.1);color:#9999ff;border:1px solid rgba(130,130,255,.2)}
.svd{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--green)}
.svd-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.filtros-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.filtros-grid-single{display:flex;margin-bottom:14px}
.filtros-grid-single .fc{min-width:140px;max-width:200px}
.filtros-grid-two{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.filtros-grid-two .fc{min-width:120px;max-width:160px}
@media(max-width:580px){.filtros-grid{grid-template-columns:repeat(3,1fr)}}
.fc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center}
.fc.ok{border-color:rgba(245,197,24,.25);background:rgba(245,197,24,.04)}
.fm{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fn{font-size:13px;font-weight:500;font-family:var(--mono);color:var(--accent);word-break:break-all}
.fn.nd{color:var(--text3);font-size:11px}
.fn.ld{color:var(--text3);font-size:11px}
.warn-box{margin-bottom:12px;padding:9px 12px;background:rgba(255,180,0,.06);border-left:2px solid rgba(232,197,71,.4);border-radius:0 6px 6px 0;font-size:12px;color:var(--text2)}
.loading-box{text-align:center;padding:2rem}
.loading-text{font-size:14px;color:var(--text2);font-family:var(--mono)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{padding:1rem;text-align:center;color:var(--red);font-size:13px;font-family:var(--mono)}
.motor-section{margin-top:12px;border-top:1px solid var(--border2);padding-top:12px}
.motor-label{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.motor-btn{font-size:12px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-family:var(--mono);margin:0 4px 4px 0;transition:all .15s}
.motor-btn:hover,.motor-btn.sel{background:var(--accent);color:var(--navy);border-color:var(--accent)}
.search-wrap{margin-bottom:1rem}
.hist-empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px;font-family:var(--mono)}
.hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px;transition:border-color .15s}
.hist-item:hover{border-color:var(--border2)}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:12px}
.hist-veh{font-size:14px;font-weight:500}
.hist-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.hist-right{text-align:right;flex-shrink:0}
.hist-date{font-size:11px;color:var(--text3);font-family:var(--mono);display:block;margin-bottom:4px}
.btn-del{font-size:11px;padding:3px 9px;font-family:var(--mono);background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text3);cursor:pointer;transition:all .15s}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.hist-pills{display:flex;flex-wrap:wrap;gap:5px}
.hist-pill{font-size:11px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 9px}
.hm{color:var(--text3);margin-right:4px}.hn{color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.filter-section-title{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;border-top:1px solid var(--border2);padding-top:10px}
.filter-section-title:first-of-type{border-top:none;padding-top:0;margin-top:4px}
.stat-label{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:500;font-family:var(--mono);color:var(--accent)}
.stat-val.sm{font-size:18px}
.bar-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.bar-title{font-size:12px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:1rem}
.bar-row{margin-bottom:12px}
.bar-label-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.bv{color:var(--text)}.bc{color:var(--text3);font-family:var(--mono)}
.bar-track{height:4px;background:var(--border);border-radius:2px}
.bar-fill{height:4px;background:var(--accent);border-radius:2px;transition:width .4s ease}

.brand-logo{height:90px;width:auto;border-radius:6px}
.brand-text h1{font-size:1.35rem;font-weight:700;color:var(--accent);letter-spacing:.5px;margin:0;line-height:1.1;text-align:center}
.brand-text .subtitle{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;margin:3px 0 0;text-align:center}
</style>
</head>

var pills=(r.gonher_aceite&&r.gonher_aceite!=="N/D"?"<div class='hist-pill'><span class='hm'>🔧 Aceite</span><span class='hn'>"+r.gonher_aceite+"</span></div>":"")+
(xrHist.fram?"<div class='hist-pill'><span class='hm'>Fram</span><span class='hn'>"+xrHist.fram+"</span></div>":"")+
(xrHist.sakura?"<div class='hist-pill'><span class='hm'>Sakura</span><span class='hn'>"+xrHist.sakura+"</span></div>":"")+
(r.aire?"<div class='hist-pill'><span class='hm'>💨 Aire</span><span class='hn'>"+r.aire+"</span></div>":"")+
(r.cabina?"<div class='hist-pill'><span class='hm'>🌿 Cabina</span><span class='hn'>"+(r.cabina.split("/")[0])+"</span></div>":"")+
(r.combustible?"<div class='hist-pill'><span class='hm'>⛽ Comb.</span><span class='hn'>"+r.combustible+"</span></div>":"");
return "<div class='hist-item'><div class='hist-top'><div><p class='hist-veh'>"+r.vehiculo+src+"</p><p class='hist-sub'>"+r.motor+"</p></div><div class='hist-right'><span class='hist-date'>"+fmtFecha(r.fecha)+"</span><button class='btn-del' onclick='eliminar("+r.id+")'>Borrar</button></div></div><div class='hist-pills'>"+(pills||"<span style='font-size:11px;color:var(--text3)'>Sin numeros</span>")+"</div></div>";
}).join("");
}
function eliminar(id){db=db.filter(function(r){return r.id!==id});saveDB();updateCount();renderHistorial()}
function renderStats(){
document.getElementById("st-total").textContent=db.length;
var v=new Set(db.map(function(r){return r.vehiculo}));document.getElementById("st-veh").textContent=v.size;
var marcas={};db.forEach(function(r){marcas[r.marca]=(marcas[r.marca]||0)+1});
var top=Object.entries(marcas).sort(function(a,b){return b[1]-a[1]})[0];document.getElementById("st-top").textContent=top?top[0]:"-";
var mods={};db.forEach(function(r){mods[r.vehiculo]=(mods[r.vehiculo]||0)+1});
var tops=Object.entries(mods).sort(function(a,b){return b[1]-a[1]}).slice(0,8);
var det=document.getElementById("statsDetalle");
if(!tops.length){det.innerHTML="<p style='color:var(--text3);font-size:13px'>Haz busquedas para ver estadisticas.</p>";return;}
var mx=tops[0][1];
det.innerHTML=tops.map(function(e){return "<div class='bar-row'><div class='bar-label-row'><span class='bv'>"+e[0]+"</span><span class='bc'>"+e[1]+"</span></div><div class='bar-track'><div class='bar-fill' style='width:"+Math.round(e[1]/mx*100)+"%'></div></div></div>"}).join("");
}
loadDB();

</script>
</body>
</html>
